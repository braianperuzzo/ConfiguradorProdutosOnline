        function atualizarIconeTema(tema) {
            const icon = document.getElementById('iconTema');
            const sun = icon.querySelector('.sun');
            const sunInner = icon.querySelector('.sun-inner');
            const rays = icon.querySelectorAll('.sun-rays line');
            const moon = icon.querySelector('.moon');
            if (sun && sunInner && moon) {
                const mostrarSol = tema === 'dark';
                const opacidadeSol = mostrarSol ? '1' : '0';
                const escalaSol = mostrarSol ? '1' : '0.5';
                [sun, sunInner].forEach(el => {
                    el.style.opacity = opacidadeSol;
                    el.style.transform = `scale(${escalaSol})`;
                });
                rays.forEach(el => {
                    el.style.opacity = opacidadeSol;
                    el.style.transform = `scale(${escalaSol})`;
                });
                moon.style.opacity = mostrarSol ? '0' : '1';
                moon.style.transform = mostrarSol ? 'scale(0.5)' : 'scale(1)';
            }
        }

        function criarIcone(nome) {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', '24');
            svg.setAttribute('height', '24');
            svg.setAttribute('fill', 'none');
            svg.setAttribute('stroke', 'currentColor');
            svg.setAttribute('stroke-width', '2');
            svg.setAttribute('stroke-linecap', 'round');
            svg.setAttribute('stroke-linejoin', 'round');
            const icones = {
                moon: ['M21 12.79A9 9 0 1 1 11.21 3A7 7 0 0 0 21 12.79z'],
                sun: [
                    ['circle', { cx: 12, cy: 12, r: 5 }],
                    ['circle', { cx: 12, cy: 12, r: 2, fill: 'currentColor' }],
                    ['line', { x1: 12, y1: 1, x2: 12, y2: 3 }],
                    ['line', { x1: 12, y1: 21, x2: 12, y2: 23 }],
                    ['line', { x1: 4.22, y1: 4.22, x2: 5.64, y2: 5.64 }],
                    ['line', { x1: 18.36, y1: 18.36, x2: 19.78, y2: 19.78 }],
                    ['line', { x1: 1, y1: 12, x2: 3, y2: 12 }],
                    ['line', { x1: 21, y1: 12, x2: 23, y2: 12 }],
                    ['line', { x1: 4.22, y1: 19.78, x2: 5.64, y2: 18.36 }],
                    ['line', { x1: 18.36, y1: 5.64, x2: 19.78, y2: 4.22 }]
                ],
                'refresh-ccw': [
                    ['polyline', { points: '1 4 1 10 7 10' }],
                    ['polyline', { points: '23 20 23 14 17 14' }],
                    ['path', { d: 'M20.49 9A9 9 0 0 0 6.51 15l-5-5' }],
                    ['path', { d: 'M3.51 15A9 9 0 0 0 17.49 9l5 5' }]
                ]
            };
            const config = icones[nome];
            if (config) {
                config.forEach(p => {
                    if (typeof p === 'string') {
                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('d', p);

                    } else {
                        const [tag, attrs] = p;
                        const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
                        Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
                        svg.appendChild(el);
                    }
                });
            }
            return svg;
        }

        function criarIcones() {
            document.querySelectorAll('[data-lucide]').forEach(el => {
                const nome = el.getAttribute('data-lucide');
                const svg = criarIcone(nome);

        }

        const greeting = document.getElementById("greeting");
        const hora = new Date().getHours();
        let saudacao = hora < 12 ? "Bom dia ☀️" : hora < 18 ? "Boa tarde 🌤️" : "Boa noite 🌙";
        greeting.textContent = `${saudacao}, estamos com saudade! 😢`;

        const params = new URLSearchParams(location.search);
        let codigo = params.get("code");

        if (!codigo) {
            const pathname = window.location.pathname.toLowerCase();
            if (pathname === "/PaginaErros/PaginaErros.html") {
                codigo = "offline";
            } else {
                codigo = "404";
            }
        }

        const registrarPaginaErro = () => {
            const payload = {
                status_code: codigo || 'generic',

        registrarPaginaErro();

            "generic": "😕 <strong>Ocorreu um erro inesperado.</strong><br>Tente novamente mais tarde."
        };

        document.getElementById("errorMessage").innerHTML = mensagens[codigo] || mensagens["generic"];

        const verificarConexao = codigo === 'offline';

        const nomeCookieTema = (typeof window !== "undefined" && window.THEME_COOKIE_NAME) || "modoEscuro";
        const dominioCookieTema = (typeof window !== "undefined" && window.THEME_COOKIE_DOMAIN) || ".redutoresibr.com.br";
        const maxIdadeCookieTema = (typeof window !== "undefined" && typeof window.THEME_COOKIE_MAX_AGE === "number")
            ? window.THEME_COOKIE_MAX_AGE
            : 60 * 60 * 24 * 365;

        function lerCookie(nome) {
            if (typeof document === 'undefined' || typeof document.cookie !== 'string') {
                return null;
            }

            const cookies = document.cookie.split(';').map(row => row.trim()).filter(Boolean);
            for (const cookie of cookies) {
                if (cookie.startsWith(`${nome}=`)) {
                    const valor = cookie.substring(nome.length + 1);
                    try {
                        return decodeURIComponent(valor);
                    } catch {
                        return valor;
                    }
                }
            }
            return null;
        }

        function definirCookieTema(valor) {
            if (typeof document === 'undefined') {
                return;
            }

            const valorCodificado = encodeURIComponent(valor);
            const atributosBase = `; path=/; max-age=${maxIdadeCookieTema}; SameSite=Lax`;
            const cookieComDominio = `${nomeCookieTema}=${valorCodificado}${atributosBase}; domain=${dominioCookieTema}`;

            try {
                document.cookie = cookieComDominio;
                if (lerCookie(nomeCookieTema) !== valor) {
                    document.cookie = `${nomeCookieTema}=${valorCodificado}${atributosBase}`;
                }
            } catch {
                document.cookie = `${nomeCookieTema}=${valorCodificado}${atributosBase}`;
            }
        }

        let temaSalvo = lerCookie(nomeCookieTema);
        if (temaSalvo === null) {
            temaSalvo = localStorage.getItem("modoEscuro");
        }
        if (temaSalvo === "1") {
            document.documentElement.dataset.theme = "dark";
        } else if (temaSalvo === "0") {
            document.documentElement.dataset.theme = "light";
        }

        function alternarTema() {
            const html = document.documentElement;
            const icon = document.getElementById('iconTema');
            const novoTemaEhEscuro = html.dataset.theme !== "dark";
            html.dataset.theme = novoTemaEhEscuro ? "dark" : "light";
            const valorTema = novoTemaEhEscuro ? "1" : "0";
            localStorage.setItem("modoEscuro", valorTema);
            definirCookieTema(valorTema);
            atualizarIconeTema(html.dataset.theme);
            icon.classList.add('rotate');
            icon.addEventListener('animationend', () => icon.classList.remove('rotate'), { once: true });
        }

        function atualizarStatus() {
            const status = document.getElementById("statusMessage");
            if (status) status.textContent = navigator.onLine ? "Conectado ✅" : "Sem conexão ❌";
        }
        if (verificarConexao) {
            window.addEventListener("online", () => { atualizarStatus(); checarConexao(); });
        } else {
            window.addEventListener("online", atualizarStatus);
        } window.addEventListener("offline", atualizarStatus);
        atualizarStatus();

        function tentarNovamente() {
            setTimeout(() => {
                sessionStorage.removeItem('offline-redirect');
                location.href = retorno;
            }, 500);
        }

        async function checarConexao() {
            if (!navigator.onLine) return;
            try {
                const resp = await fetch('/Imagens/Icone.ico', { method: 'HEAD', cache: 'no-store' });
                const tipo = resp.headers.get('content-type') || '';
                if (resp.ok && tipo.includes('image') && !resp.url.includes('/PaginaErros/PaginaErros.html')) {
                    sessionStorage.removeItem('offline-redirect');
                    location.href = retorno;
                }
            } catch { }
        }

        if (verificarConexao) {
            checarConexao();
        }

        atualizarIconeTema(document.documentElement.dataset.theme || 'light');
        const handleQueuedRequests = e => {
            const data = e.data;
            if (!data || data.type !== 'queuedRequests') {
                return;
            }
            if (data.error) {
                console.warn('Falha ao listar solicitações pendentes do Service Worker:', data.error);
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.removeEventListener('message', handleQueuedRequests);
                }
                return;
            }
            if (data.requests && data.requests.length) {
                const section = document.getElementById('pending');
                const list = document.getElementById('pendingList');
                if (!section || !list) {
                    return;
                }
                list.innerHTML = '';
                data.requests.forEach(r => {
                    const li = document.createElement('li');
                    try {
                        li.textContent = `${r.method} ${new URL(r.url).pathname}`;
                    } catch {
                        li.textContent = `${r.method} ${r.url}`;
                    }
                    list.appendChild(li);
                });
                section.style.display = 'block';
            }
        };

        if ('serviceWorker' in navigator) {
            const { serviceWorker } = navigator;
            const detachListener = () => serviceWorker.removeEventListener('message', handleQueuedRequests);
            const requestQueuedData = worker => {
                if (worker && typeof worker.postMessage === 'function') {
                    worker.postMessage({ type: 'getQueuedRequests' });
                }
            };

            serviceWorker.removeEventListener('message', handleQueuedRequests);
            serviceWorker.addEventListener('message', handleQueuedRequests);

            if (serviceWorker.controller) {
                requestQueuedData(serviceWorker.controller);
            } else {
                serviceWorker.ready.then(reg => {
                    requestQueuedData(reg.active);
                }).catch(() => { });
            }

            serviceWorker.addEventListener('controllerchange', () => {
                requestQueuedData(serviceWorker.controller);
            });

            window.addEventListener('beforeunload', detachListener, { once: true });

            const sendQueuedButton = document.getElementById('sendQueued');
            if (sendQueuedButton) {
                sendQueuedButton.addEventListener('click', () => {
                    serviceWorker.ready.then(reg => {
                        if ('sync' in reg) {
                            reg.sync.register('sync-requests').catch(() => { });
                        }
                    });
                });
            }
        }
    </script>
