    <script nonce="<?= htmlspecialchars(csp_nonce(), ENT_QUOTES, 'UTF-8'); ?>">
        window.keepLoading = true;
        const LOADING_FAILSAFE_MS = 45000;
        let loaderFailsafeTimer = window.setTimeout(() => {
            if (!window.keepLoading) {
                return;
            }
            console.warn('Carrinho: carregamento demorou mais do que o esperado, liberando tela.');
            window.keepLoading = false;
            if (typeof window.hideLoadingScreen === 'function') {
                window.hideLoadingScreen();
            }
        }, LOADING_FAILSAFE_MS);

        const limparFailsafeLoading = () => {
            window.keepLoading = false;
            if (!loaderFailsafeTimer) {
                return;
            }
            window.clearTimeout(loaderFailsafeTimer);
            loaderFailsafeTimer = null;
        };

        window.addEventListener('initial-loader-hidden', limparFailsafeLoading);
        const exibirFalhaCarregarPagina = (erro) => {
            try {
                console.error('Carrinho: falha ao carregar a página do carrinho.', erro);
            } catch { }
            const container = document.getElementById('pagina-completa');
            if (container) {
                container.innerHTML = `
                    <main class="main mb-0 pb-0">
                        <div class="container pt-3 pb-5 text-center">
                            <h2 class="mb-3">Carrinho de <span class="text-orange">Produtos</span></h2>
                            <p>Não foi possível carregar o carrinho agora. Atualize a página ou tente novamente em alguns instantes.</p>
                            <button type="button" class="botao-ibr botao-primario" onclick="location.reload()"
                                data-gtag-event="carrinho-recarregar" data-gtag-category="Carrinho"
                                data-gtag-label="fallback">Recarregar</button>
                        </div>
                    </main>
                `;
            }
        };

        const MAX_WAIT_CARREGAR_PAGINA_MS = 12000;
        const carregarPaginaStart = Date.now();

        (function waitForCarregarPagina() {
            if (typeof carregarPagina === 'function') {
                carregarPagina('/PaginasCarrinhoProdutos/PaginaCarrinhoProdutos.html', false)
                    .then(() => { })
                    .catch((erro) => {
                        exibirFalhaCarregarPagina(erro);
                        window.keepLoading = false;
                        if (typeof window.hideLoadingScreen === 'function') {
                            window.hideLoadingScreen();
                        }
                        limparFailsafeLoading();
                    })
                    .finally(() => { });
            } else {
                if (Date.now() - carregarPaginaStart >= MAX_WAIT_CARREGAR_PAGINA_MS) {
                    exibirFalhaCarregarPagina(new Error('CarregarPagina indisponível.'));
                    window.keepLoading = false;
                    if (typeof window.hideLoadingScreen === 'function') {
                        window.hideLoadingScreen();
                    }
                    limparFailsafeLoading();
                    return;
                }
                window.setTimeout(waitForCarregarPagina, 50);
            }
        })();
    </script>
