<script nonce="<?= htmlspecialchars(csp_nonce(), ENT_QUOTES, 'UTF-8'); ?>">
    document.addEventListener('DOMContentLoaded', () => {
        const metaDescription = document.querySelector('meta[name="description"]');
        const ogTitle = document.querySelector('meta[property="og:title"]');
        const ogDescription = document.querySelector('meta[property="og:description"]');
        const metaKeywords = document.querySelector('meta[name="keywords"]');
        const schemaInfo = (() => {
            const isWebPageNode = (node) => node && typeof node === 'object' && !Array.isArray(node)
                && (node['@type'] === 'WebPage' || (typeof node['@id'] === 'string' && node['@id'].includes('#webpage')));
            const scripts = Array.from(document.querySelectorAll('head script[type="application/ld+json"]'));

            for (const script of scripts) {
                const content = script.textContent?.trim();
                if (!content) continue;
                try {
                    const parsed = JSON.parse(content);

                    if (Array.isArray(parsed)) {
                        const index = parsed.findIndex(isWebPageNode);
                        if (index !== -1) {
                            const original = JSON.parse(JSON.stringify(parsed[index]));
                            return {
                                script,
                                original,
                                update(data) {
                                    const next = parsed.map((item, i) => i === index ? data : item);
                                    script.textContent = JSON.stringify(next);
                                }
                            };
                        }
                    } else if (parsed && Array.isArray(parsed['@graph'])) {
                        const index = parsed['@graph'].findIndex(isWebPageNode);
                        if (index !== -1) {
                            const original = JSON.parse(JSON.stringify(parsed['@graph'][index]));
                            return {
                                script,
                                original,
                                update(data) {
                                    const next = {
                                        ...parsed,
                                        '@graph': parsed['@graph'].map((item, i) => i === index ? data : item)
                                    };
                                    script.textContent = JSON.stringify(next);
                                }
                            };
                        }
                    } else if (isWebPageNode(parsed)) {
                        const original = JSON.parse(JSON.stringify(parsed));
                        return {
                            script,
                            original,
                            update(data) {
                                script.textContent = JSON.stringify(data);
                            }
                        };
                    }
                } catch { }
            }

            return { script: null, original: null, update() { } };
        })();

        const ldJsonScript = schemaInfo.script;
        const originalLdJson = schemaInfo.original;
        const updateLdJson = schemaInfo.update;

        const originalMeta = {
            description: metaDescription?.getAttribute('content') || '',
            ogTitle: ogTitle?.getAttribute('content') || '',
            ogDescription: ogDescription?.getAttribute('content') || '',
            keywords: metaKeywords?.getAttribute('content') || ''
        };

        function atualizarMetadados(visivel, tituloCompleto) {
            const descricao = (visivel?.dataset.description || '').replace(/\s+/g, ' ').trim();
            const site = visivel?.dataset.site || '';
            const catalogo = visivel?.dataset.catalog || '';
            const priceValidUntil = new Date(Date.now() + 1000 * 60 * 60 * 24 * 180).toISOString().slice(0, 10);
            const moeda = (visivel?.dataset.priceCurrency || visivel?.dataset.currency || 'BRL').trim() || 'BRL';
            const precoBruto = (visivel?.dataset.price || visivel?.dataset.preco || '0.00').trim();
            const precoNormalizado = precoBruto.replace(/\./g, '').replace(',', '.');
            const precoNumero = Number(precoNormalizado);
            const preco = Number.isFinite(precoNumero) ? precoNumero.toFixed(2) : '0.00';

            const paginaTitulo = tituloCompleto ? 'Configurador de Produtos - ' + tituloCompleto : 'Configurador de Produtos';

            if (metaDescription) {
                metaDescription.setAttribute('content', descricao || originalMeta.description);
            }

            if (ogTitle) {
                ogTitle.setAttribute('content', paginaTitulo);
            }

            if (ogDescription) {
                ogDescription.setAttribute('content', descricao || originalMeta.ogDescription);
            }

            if (metaKeywords) {
                const palavrasChave = originalMeta.keywords ? originalMeta.keywords.split(',').map(k => k.trim()).filter(Boolean) : [];
                if (tituloCompleto && !palavrasChave.includes(tituloCompleto)) {
                    palavrasChave.unshift(tituloCompleto);
                }
                if (descricao) {
                    const termosDescricao = descricao.split(/[,;\.]/).map(parte => parte.trim()).filter(Boolean);
                    termosDescricao.forEach(termo => {
                        if (!palavrasChave.includes(termo)) {
                            palavrasChave.push(termo);
                        }
                    });
                }
                metaKeywords.setAttribute('content', palavrasChave.join(', '));
            }

            if (ldJsonScript && originalLdJson) {
                try {
                    const atualizado = {
                        ...originalLdJson,
                        name: paginaTitulo,
                        description: descricao || originalLdJson.description || ''
                    };
                    if (site) {
                        atualizado.url = site;
                    }
                    if (catalogo) {
                        atualizado.offers = {
                            '@type': 'Offer',
                            url: catalogo,
                            availability: 'https://schema.org/InStock',
                            priceValidUntil: priceValidUntil,
                            priceCurrency: 'BRL',
                            priceCurrency: moeda,
                            price: preco,
                            shippingDetails: {
                                '@type': 'OfferShippingDetails',
                                shippingRate: {
                                    '@type': 'MonetaryAmount',
                                    value: '0',
                                    currency: 'BRL'
                                },
                                deliveryTime: {
                                    '@type': 'ShippingDeliveryTime',
                                    handlingTime: {
                                        '@type': 'QuantitativeValue',
                                        minValue: 0,
                                        maxValue: 1,
                                        unitCode: 'DAY'
                                    },
                                    transitTime: {
                                        '@type': 'QuantitativeValue',
                                        minValue: 1,
                                        maxValue: 10,
                                        unitCode: 'DAY'
                                    }
                                }
                            }
                        };
                    } else if (!originalLdJson?.offers) {
                        delete atualizado.offers;
                    }
                    updateLdJson(atualizado);
                } catch { }
            }
        }

        function atualizarTituloDinamicoDocumento() {
            window.__refreshDynamicDocumentTitle?.({
                sourceDoc: document,
                pageUrl: window.location.pathname + window.location.search
            });
        }

        function atualizarTitulo() {
            const visivel = Array.from(document.querySelectorAll('.galeria-produto[data-title]'))
                .find(g => g.style.display !== 'none');
            const titulo = visivel ? visivel.dataset.title : '';
            const el = document.getElementById('texto-configurador');
            if (!el) return;
            if (!titulo) {
                el.innerHTML = '';
                atualizarMetadados(null, '');
                atualizarTituloDinamicoDocumento();
                return;
            }
            let html = 'Configure o seu ';
            if (titulo.toUpperCase().startsWith('IBR ')) {
                const partes = titulo.split(' ');
                const primeiro = partes.shift();
                const resto = partes.join(' ');
                html += '<span class="text-dark">' + primeiro + '</span>';
                if (resto) html += ' <span class="text-orange">' + resto + '</span>';
            } else {
                html += titulo;
            }
            el.innerHTML = html;
            atualizarMetadados(visivel, titulo);
            atualizarTituloDinamicoDocumento();
        }
        atualizarTitulo();
        setTimeout(atualizarTitulo);
        document.getElementById('AELN')?.addEventListener('change', atualizarTitulo);
    });
</script>

<script nonce="<?= htmlspecialchars(csp_nonce(), ENT_QUOTES, 'UTF-8'); ?>">
    function exibirBotaoCompartilhar() {
        const wrapper = document.getElementById("compartilhar-wrapper");
        if (wrapper) wrapper.style.display = "block";
        if (typeof exibirBotaoRefazerConfiguracao === "function") exibirBotaoRefazerConfiguracao();
    }

    function exibirBotaoSolicitarCotacao() {
        const wrapper = document.getElementById("cotacao-wrapper");
        if (wrapper) wrapper.style.display = "block";
    }

    async function gerarCodigoProduto() {
        if (typeof formularioCompleto === 'function' && !formularioCompleto(true)) {
            if (typeof exibirAlerta === 'function') {
                exibirAlerta('⚠️ Por favor, preencha todos os campos antes de gerar o produto.');
            }
            return;
        }
        const AELN = v("AELN");
        const AEBR = v("AEBR");
        const AETP = v("AETP");
        const AEEL = v("AEEL");
        const AEEE = v("AEEE");
        const AEEE2 = v("AEEE2");

        let ELEMENTOELASTICO = await fetch(`/PaginasConfiguradoresSeletoresConsultas/AE/AEOLN.php?AELN=${AELN}&AEBR=${AEBR}&AETP=${AETP}&AEEL=${AEEL}`)
            .then(r => r.ok ? r.text() : "")
            .then(t => t.trim().replaceAll(" ", "").toUpperCase());

        const COMPOSICAOCODIGO = [
            AELN,
            AEBR,
            AETP,
            ELEMENTOELASTICO,
            AEEE,
            AEEE2
        ]
            .map(s => s.replace(/^\.|\.$/g, ""))
            .map(s => s.replace(/,\s*/g, ".").replace(/\s+/g, ""))
            .map(s => s.replace(/\.{2,}/g, "."))
            .filter(Boolean)
            .join(".");

        document.getElementById("refProduto").textContent = COMPOSICAOCODIGO;
        mostrarDetalhesProduto({}, COMPOSICAOCODIGO);

        fetch("/PaginasConsultaProdutos/CodigoDescricaoObservacaoProduto.php", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: `codigo=${encodeURIComponent(COMPOSICAOCODIGO)}`
        })
            .then(resp => resp.text())
            .then(text => {
                let dados;
                try { dados = JSON.parse(text); } catch { throw new Error(text); }
                return dados;
            })
            .then(dados => {
                mostrarDetalhesProduto(dados || {}, COMPOSICAOCODIGO);
                window.codigoProduto = dados?.CD_PRODUTO || "";
                window.codigoProduto = dados?.CD_PRODUTO || "";
                window.codigoEstoquePendente = dados?.CD_PRODUTO || "";
                if (typeof mostrarDetalhesEstoque === 'function') {
                    mostrarDetalhesEstoque(dados?.CD_PRODUTO || "");
                }
                if (typeof mostrarDetalhesPreco === 'function') {
                    const params = gerarLinkAtual().split('?')[1] || '';
                    mostrarDetalhesPreco(params);
                }
            })
            .catch(err => {

                if (typeof mostrarDetalhesPreco === 'function') {
                    const params = gerarLinkAtual().split('?')[1] || '';
                    mostrarDetalhesPreco(params);
                }
            });


        if (window.manualHistoricoProduto && window.ultimoHistoricoProduto !== COMPOSICAOCODIGO) {
            const linkAtual = gerarLinkAtual();
            fetch("/PaginasAreaClienteSessaoPerfil/RegistrarProduto.php", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `produto=${encodeURIComponent(COMPOSICAOCODIGO)}&link=${encodeURIComponent(linkAtual)}`
            });
            window.ultimoHistoricoProduto = COMPOSICAOCODIGO;
            window.manualHistoricoProduto = false;
        }

        exibirBotaoCompartilhar();
        //exibirBotaoSolicitarDesenho();
        exibirBotaoSolicitarCotacao();
    }
</script>


<script nonce="<?= htmlspecialchars(csp_nonce(), ENT_QUOTES, 'UTF-8'); ?>">
    const endpointPreco = '/PaginasConfiguradoresPrecoVenda/AEPV.php';
    function mostrarDetalhesPreco(paramString) {
        const params = new URLSearchParams(
            typeof paramString === 'string'
                ? paramString
                : new URLSearchParams(paramString).toString()
        );
        if (window.codigoProduto) {
            params.append('produto', window.codigoProduto);
        }
        const codInput = document.getElementById('codigoClienteInput');
        if (codInput && codInput.value.trim()) {
            params.set('pessoa', codInput.value.trim());
        }
        fetch(endpointPreco, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params.toString()
        })
            .then(r => r.json())
            .then(p => {
                const valorRS = p && p['001'] ? parseFloat(String(p['001']).replace(/\./g, '').replace(',', '.')) : NaN;
                const valorSP = p && p['003'] ? parseFloat(String(p['003']).replace(/\./g, '').replace(',', '.')) : NaN;
                const textoRS = !isNaN(valorRS) && valorRS !== 0 ? `R$ ${valorRS.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}` : '👉 😊 Ops! O preço de venda está indisponível no momento. 📞 Fale com nossos Consultores Comerciais para mais informações!';
                const textoSP = !isNaN(valorSP) && valorSP !== 0 ? `R$ ${valorSP.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}` : '👉 😊 Ops! O preço de venda está indisponível no momento. 📞 Fale com nossos Consultores Comerciais para mais informações!';
                const precoRSElem = document.getElementById('precoRS');
                if (precoRSElem) precoRSElem.innerHTML = `<strong>Preço Final de Venda:</strong> ${textoRS}`;
                const precoSPElem = document.getElementById('precoSP');
                if (precoSPElem) precoSPElem.innerHTML = `<strong>Preço Final de Venda:</strong> ${textoSP}`;
                const linhaPrecoElem = document.getElementById('linhaEntreEmpresasPreco');
                if (linhaPrecoElem) linhaPrecoElem.style.display = 'block';
                const notaRS = document.getElementById('notaPrecoRS');
                const notaSP = document.getElementById('notaPrecoSP');
                const mostrarNota = window.produtoExiste === false;
                if (notaRS) notaRS.style.display = mostrarNota ? 'block' : 'none';
                if (notaSP) notaSP.style.display = mostrarNota ? 'block' : 'none';
            });
    }

    document.addEventListener('DOMContentLoaded', () => {
        const codInput = document.getElementById('codigoClienteInput');
        const codBtn = document.getElementById('codigoClienteBtn');
        const limparBtn = document.getElementById('limparClienteBtn');
        const nomeInfo = document.getElementById('nomeClienteInfo');

        let nomeCtrl = null;
        const carregarNome = async codigo => {
            if (!nomeInfo) return;
            if (nomeCtrl) nomeCtrl.abort();
            if (!codigo) { nomeInfo.textContent = ''; nomeCtrl = null; return; }
            nomeCtrl = new AbortController();
            try {
                const r = await fetch('/AcessosConsultas/BuscarDadosPessoaPlenus.php?q=' + encodeURIComponent(codigo) + '&offset=0', { signal: nomeCtrl.signal });
                if (!r.ok) throw new Error('HTTP');
                const j = await r.json();
                const pessoa = (j.pessoas || []).find(p => p.CD_PESSOA === codigo);
                nomeInfo.textContent = pessoa ? pessoa.NM_PESSOA : '';
            } catch (e) {
                if (e.name !== 'AbortError') nomeInfo.textContent = '';
            } finally {
                nomeCtrl = null;
            }
        };

        const atualizarPreco = () => {
            const params = gerarLinkAtual().split('?')[1] || '';
            carregarNome(codInput?.value.trim());
            mostrarDetalhesPreco(params);
        };

        if (codInput) {
            codInput.value = '001';
            codInput.addEventListener('change', atualizarPreco);
            codInput.addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); atualizarPreco(); }
            });
        }
        if (codBtn) {
            codBtn.addEventListener('click', atualizarPreco);
        }
        if (limparBtn) {
            limparBtn.addEventListener('click', () => {
                if (codInput) codInput.value = '001';
                atualizarPreco();
            });
        }
    });
</script>
