<script nonce="<?= htmlspecialchars(csp_nonce(), ENT_QUOTES, 'UTF-8'); ?>">
  document.addEventListener('DOMContentLoaded', () => {
    const metaDescription = document.querySelector('meta[name="description"]');
    const ogTitle = document.querySelector('meta[property="og:title"]');
    const ogDescription = document.querySelector('meta[property="og:description"]');
    const metaKeywords = document.querySelector('meta[name="keywords"]');
    const schemaInfo = (() => {
      const isWebPageNode = (node) => node && typeof node === 'object' && !Array.isArray(node)
        && (node['@type'] === 'WebPage' || (typeof node['@id'] === 'string' && node['@id'].includes('#webpage')));
      const scripts = Array.from(document.querySelectorAll('head script[type="application/ld+json"]'));

      for (const script of scripts) {
        const content = script.textContent?.trim();
        if (!content) continue;
        try {
          const parsed = JSON.parse(content);

          if (Array.isArray(parsed)) {
            const index = parsed.findIndex(isWebPageNode);
            if (index !== -1) {
              const original = JSON.parse(JSON.stringify(parsed[index]));
              return {
                script,
                original,
                update(data) {
                  const next = parsed.map((item, i) => i === index ? data : item);
                  script.textContent = JSON.stringify(next);
                }
              };
            }
          } else if (parsed && Array.isArray(parsed['@graph'])) {
            const index = parsed['@graph'].findIndex(isWebPageNode);
            if (index !== -1) {
              const original = JSON.parse(JSON.stringify(parsed['@graph'][index]));
              return {
                script,
                original,
                update(data) {
                  const next = {
                    ...parsed,
                    '@graph': parsed['@graph'].map((item, i) => i === index ? data : item)
                  };
                  script.textContent = JSON.stringify(next);
                }
              };
            }
          } else if (isWebPageNode(parsed)) {
            const original = JSON.parse(JSON.stringify(parsed));
            return {
              script,
              original,
              update(data) {
                script.textContent = JSON.stringify(data);
              }
            };
          }
        } catch { }
      }

      return { script: null, original: null, update() { } };
    })();

    const ldJsonScript = schemaInfo.script;
    const originalLdJson = schemaInfo.original;
    const updateLdJson = schemaInfo.update;

    const originalMeta = {
      description: metaDescription?.getAttribute('content') || '',
      ogTitle: ogTitle?.getAttribute('content') || '',
      ogDescription: ogDescription?.getAttribute('content') || '',
      keywords: metaKeywords?.getAttribute('content') || ''
    };

    function atualizarMetadados(visivel, tituloCompleto) {
      const descricao = (visivel?.dataset.description || '').replace(/\s+/g, ' ').trim();
      const site = visivel?.dataset.site || '';
      const catalogo = visivel?.dataset.catalog || '';
      const priceValidUntil = new Date(Date.now() + 1000 * 60 * 60 * 24 * 180).toISOString().slice(0, 10);
      const moeda = (visivel?.dataset.priceCurrency || visivel?.dataset.currency || 'BRL').trim() || 'BRL';
      const precoBruto = (visivel?.dataset.price || visivel?.dataset.preco || '0.00').trim();
      const precoNormalizado = precoBruto.replace(/\./g, '').replace(',', '.');
      const precoNumero = Number(precoNormalizado);
      const preco = Number.isFinite(precoNumero) ? precoNumero.toFixed(2) : '0.00';

      const paginaTitulo = tituloCompleto ? 'Configurador de Produtos - ' + tituloCompleto : 'Configurador de Produtos';

      if (metaDescription) {
        metaDescription.setAttribute('content', descricao || originalMeta.description);
      }

      if (ogTitle) {
        ogTitle.setAttribute('content', paginaTitulo);
      }

      if (ogDescription) {
        ogDescription.setAttribute('content', descricao || originalMeta.ogDescription);
      }

      if (metaKeywords) {
        const palavrasChave = originalMeta.keywords ? originalMeta.keywords.split(',').map(k => k.trim()).filter(Boolean) : [];
        if (tituloCompleto && !palavrasChave.includes(tituloCompleto)) {
          palavrasChave.unshift(tituloCompleto);
        }
        if (descricao) {
          const termosDescricao = descricao.split(/[,;\.]/).map(parte => parte.trim()).filter(Boolean);
          termosDescricao.forEach(termo => {
            if (!palavrasChave.includes(termo)) {
              palavrasChave.push(termo);
            }
          });
        }
        metaKeywords.setAttribute('content', palavrasChave.join(', '));
      }

      if (ldJsonScript && originalLdJson) {
        try {
          const atualizado = {
            ...originalLdJson,
            name: paginaTitulo,
            description: descricao || originalLdJson.description || ''
          };
          if (site) {
            atualizado.url = site;
          }
          if (catalogo) {
            atualizado.offers = {
              '@type': 'Offer',
              url: catalogo,
              availability: 'https://schema.org/InStock',
              priceValidUntil: priceValidUntil,
              priceCurrency: 'BRL',
              priceCurrency: moeda,
              price: preco,
              shippingDetails: {
                '@type': 'OfferShippingDetails',
                shippingRate: {
                  '@type': 'MonetaryAmount',
                  value: '0',
                  currency: 'BRL'
                },
                deliveryTime: {
                  '@type': 'ShippingDeliveryTime',
                  handlingTime: {
                    '@type': 'QuantitativeValue',
                    minValue: 0,
                    maxValue: 1,
                    unitCode: 'DAY'
                  },
                  transitTime: {
                    '@type': 'QuantitativeValue',
                    minValue: 1,
                    maxValue: 10,
                    unitCode: 'DAY'
                  }
                }
              }
            };
          } else if (!originalLdJson?.offers) {
            delete atualizado.offers;
          }
          updateLdJson(atualizado);
        } catch { }
      }
    }

    function atualizarTituloDinamicoDocumento() {
      window.__refreshDynamicDocumentTitle?.({
        sourceDoc: document,
        pageUrl: window.location.pathname + window.location.search
      });
    }

    function atualizarTitulo() {
      const visivel = Array.from(document.querySelectorAll('.galeria-produto[data-title]'))
        .find(g => g.style.display !== 'none');
      const titulo = visivel ? visivel.dataset.title : '';
      const el = document.getElementById('texto-configurador');
      if (!el) return;
      if (!titulo) {
        el.innerHTML = '';
        atualizarMetadados(null, '');
        atualizarTituloDinamicoDocumento();
        return;
      }
      let html = 'Configure o seu ';
      if (titulo.toUpperCase().startsWith('IBR ')) {
        const partes = titulo.split(' ');
        const primeiro = partes.shift();
        const resto = partes.join(' ');
        html += '<span class="text-dark">' + primeiro + '</span>';
        if (resto) html += ' <span class="text-orange">' + resto + '</span>';
      } else {
        html += titulo;
      }
      el.innerHTML = html;
      atualizarMetadados(visivel, titulo);
      atualizarTituloDinamicoDocumento();
    }
    atualizarTitulo();
    setTimeout(atualizarTitulo);
    document.getElementById('QULN')?.addEventListener('change', atualizarTitulo);
  });
</script>

<script nonce="<?= htmlspecialchars(csp_nonce(), ENT_QUOTES, 'UTF-8'); ?>">


  async function carregarQULN() {
    const qulnSelect = document.getElementById('QULN');

    const response = await fetch('/PaginasConfiguradoresSeletoresConsultas/QU/QULN.php');
    const optionsHTML = await response.text();

    qulnSelect.innerHTML = optionsHTML;

    qulnSelect.value = '';

    qulnSelect.dispatchEvent(new Event('change'));
  }

  document.addEventListener('DOMContentLoaded', () => {
    carregarQULN();
  });

  async function carregarQUBR() {
    const qulnSelect = document.getElementById('QULN');
    const qubrSelect = document.getElementById('QUBR');
    const grupoQUBR = document.getElementById('GrupoQUBR');

    const quln = qulnSelect.value;

    const response = await fetch(`/PaginasConfiguradoresSeletoresConsultas/QU/QUBR.php?QULN=${encodeURIComponent(quln)}`);
    const optionsHTML = await response.text();

    qubrSelect.innerHTML = optionsHTML;
    grupoQUBR.style.display = 'block';
    qubrSelect.disabled = false;
    qubrSelect.value = '';

    qubrSelect.addEventListener('change', () => {
      carregarQUVZ();
    });

    qubrSelect.addEventListener('change', () => {
      const subgrupo = grupoQUBR.querySelector('.subgrupo');
      subgrupo.style.display = qubrSelect.value ? 'block' : 'none';
    });

    carregarQUEX();
    carregarQUVZ();
  }

  const qulnSelect = document.getElementById('QULN');
  if (qulnSelect) {
    qulnSelect.addEventListener('change', carregarQUBR);
    qulnSelect.addEventListener('change', carregarQUOPC);
  }

  function carregarQUEX() {
    const quln = document.getElementById('QULN')?.value;
    const qubr = document.getElementById('QUBR')?.value;
    const grupoQUEX = document.getElementById('GrupoQUEX');
    const quexSelect = document.getElementById('QUEX');
    const optionS = quexSelect?.querySelector('option[value="S"]');

    if (qubr) {
      grupoQUEX.style.display = 'block';
      quexSelect.value = 'N';

      if (optionS) {
        optionS.style.display = (quln === '1.Q') ? 'inline' : 'none';
        if (quexSelect.value === 'S' && quln !== '1.Q') {
          quexSelect.value = 'N';
        }
      }

      if (qubr === '075') {
        carregarQUVZ();
      } else {
        carregarQURD();
      }
    } else {
      grupoQUEX.style.display = 'none';
    }
  }

  const qubrSelect = document.getElementById('QUBR');
  if (qubrSelect) {
    qubrSelect.addEventListener('change', carregarQUEX);
    qubrSelect.addEventListener('change', carregarQUPM);
    qubrSelect.addEventListener('change', carregarQUOPC);
  }

  async function carregarQUVZ() {
    const quln = document.getElementById('QULN')?.value;
    const qubr = document.getElementById('QUBR')?.value;
    const grupoQUVZ = document.getElementById('GrupoQUVZ');
    const quvzSelect = document.getElementById('QUVZ');

    if (qubr !== '075') {
      grupoQUVZ.style.display = 'none';
      quvzSelect.innerHTML = '';
      return;
    }

    const response = await fetch(`/PaginasConfiguradoresSeletoresConsultas/QU/QUVZ.php?QULN=${encodeURIComponent(quln)}&QUBR=${encodeURIComponent(qubr)}`);
    const optionsHTML = await response.text();
    quvzSelect.innerHTML = optionsHTML;

    grupoQUVZ.style.display = 'block';
    quvzSelect.disabled = false;

    const defaultOption = quvzSelect.querySelector('option[value="30MM"]');
    quvzSelect.value = defaultOption ? '30MM' : '';

    quvzSelect.dispatchEvent(new Event('change'));

    carregarQURD();
  }

  const quexSelect = document.getElementById('QUEX');
  if (quexSelect) {
    quexSelect.addEventListener('change', () => {
      const qubr = document.getElementById('QUBR')?.value;
      if (qubr !== '075') {
        carregarQURD();
      }
    });

    carregarQURD();
  }

  async function carregarQURD() {
    const quln = document.getElementById('QULN')?.value;
    const qubr = document.getElementById('QUBR')?.value;
    const quvz = document.getElementById('QUVZ')?.value || '';
    const qurdSelect = document.getElementById('QURD');

    const response = await fetch(`/PaginasConfiguradoresSeletoresConsultas/QU/QURD.php?QULN=${encodeURIComponent(quln)}&QUBR=${encodeURIComponent(qubr)}&QUVZ=${encodeURIComponent(quvz)}`);

    const optionsHTML = await response.text();
    qurdSelect.innerHTML = optionsHTML;
    qurdSelect.disabled = false;
    qurdSelect.value = '';
  }

  async function carregarQUCM() {
    const quln = document.getElementById('QULN')?.value;
    const qubr = document.getElementById('QUBR')?.value;
    const quvz = document.getElementById('QUVZ')?.value || '';
    const qurd = document.getElementById('QURD')?.value;
    const grupoQUCM = document.getElementById('GrupoQUCM');
    const qucmSelect = document.getElementById('QUCM');

    const response = await fetch(`/PaginasConfiguradoresSeletoresConsultas/QU/QUCM.php?QULN=${encodeURIComponent(quln)}&QUBR=${encodeURIComponent(qubr)}&QUVZ=${encodeURIComponent(quvz)}&QURD=${encodeURIComponent(qurd)}`);
    const optionsHTML = await response.text();
    qucmSelect.innerHTML = optionsHTML;

    grupoQUCM.style.display = 'block';
    qucmSelect.disabled = false;
    qucmSelect.value = '';

    const subgrupoQUBU = grupoQUCM.querySelector('.subgrupo');
    if (subgrupoQUBU) {

      subgrupoQUBU.style.display = 'none';

      qucmSelect.addEventListener('change', () => {
        const qucpSelect = document.getElementById('QUCP');
        const deveOcultar = qucpSelect?.value.includes('EE');
        subgrupoQUBU.style.display = deveOcultar ? 'none' : (qucmSelect.value ? 'block' : 'none');
      });
    }
  }

  async function carregarQUBU() {
    const quln = document.getElementById('QULN')?.value;
    const qubr = document.getElementById('QUBR')?.value;
    const quvz = document.getElementById('QUVZ')?.value || '';
    const qurd = document.getElementById('QURD')?.value;
    const qucm = document.getElementById('QUCM')?.value;
    const qucp = document.getElementById('QUCP')?.value || '';
    const grupoQUBU = document.getElementById('GrupoQUBU');
    const qubuSelect = document.getElementById('QUBU');
    const subgrupoQUBU = document.querySelector('#GrupoQUCM .subgrupo');

    if (qucp.includes('EE')) {
      grupoQUBU.style.display = 'none';
      if (subgrupoQUBU) subgrupoQUBU.style.display = 'none';
      qubuSelect.innerHTML = '';
      qubuSelect.disabled = true;
      return;
    }

    const response = await fetch(`/PaginasConfiguradoresSeletoresConsultas/QU/QUBU.php?QULN=${encodeURIComponent(quln)}&QUBR=${encodeURIComponent(qubr)}&QUVZ=${encodeURIComponent(quvz)}&QURD=${encodeURIComponent(qurd)}&QUCM=${encodeURIComponent(qucm)}&QUCP=${encodeURIComponent(qucp)}`);
    if (!response.ok) throw new Error('Erro ao buscar QUBU');

    const optionsHTML = await response.text();
    qubuSelect.innerHTML = optionsHTML;

    grupoQUBU.style.display = 'block';
    qubuSelect.disabled = false;

    const optN = qubuSelect.querySelector('option[value="N"]');
    if (optN) {
      qubuSelect.value = 'N';
    } else if (qubuSelect.options.length > 0) {
      qubuSelect.selectedIndex = 0;
    }

    qubuSelect.dispatchEvent(new Event('change'));
  }

  const qurdSelect = document.getElementById('QURD');
  if (qurdSelect) qurdSelect.addEventListener('change', carregarQUCM);

  const qucmSelect = document.getElementById('QUCM');
  if (qucmSelect) qucmSelect.addEventListener('change', carregarQUBU);

  const qubuSelect = document.getElementById('QUBU');
  if (qubuSelect) qubuSelect.addEventListener('change', carregarQUCP);

  async function carregarQUCP() {
    const quln = document.getElementById('QULN')?.value;
    const qubr = document.getElementById('QUBR')?.value;
    const qucm = document.getElementById('QUCM')?.value;
    const quvz = document.getElementById('QUVZ')?.value || '';
    const qurd = document.getElementById('QURD')?.value;
    const qucpSelect = document.getElementById('QUCP');

    const response = await fetch(`/PaginasConfiguradoresSeletoresConsultas/QU/QUCP.php?QULN=${encodeURIComponent(quln)}&QUBR=${encodeURIComponent(qubr)}&QUCM=${encodeURIComponent(qucm)}&QUVZ=${encodeURIComponent(quvz)}&QURD=${encodeURIComponent(qurd)}`);
    const optionsHTML = await response.text();
    qucpSelect.innerHTML = optionsHTML;
    qucpSelect.disabled = false;
    qucpSelect.value = '';
  }

  const qucpSelect = document.getElementById('QUCP');
  if (qucpSelect) {
    qucpSelect.addEventListener('change', () => {
      const grupoQUBU = document.getElementById('GrupoQUBU');
      const subgrupoQUBU = document.querySelector('#GrupoQUCM .subgrupo');
      const qucmSelect = document.getElementById('QUCM');
      const qubuSelect = document.getElementById('QUBU');
      if (!qubuSelect || !grupoQUBU) return;
      const valorSelecionado = qucpSelect.value;
      grupoQUBU.style.display = valorSelecionado.includes("EE") ? 'none' : 'block';
      if (subgrupoQUBU) {
        subgrupoQUBU.style.display = valorSelecionado.includes("EE")
          ? 'none'
          : (qucmSelect?.value ? 'block' : 'none');
      }
    });

    qucpSelect.addEventListener('change', carregarQUAF);
  }

  async function carregarQUAF() {
    const quln = document.getElementById('QULN')?.value;
    const qubr = document.getElementById('QUBR')?.value;
    const grupoQUAF = document.getElementById('GrupoQUAF');
    const quafSelect = document.getElementById('QUAF');

    const response = await fetch(`/PaginasConfiguradoresSeletoresConsultas/QU/QUAF.php?QULN=${encodeURIComponent(quln)}&QUBR=${encodeURIComponent(qubr)}`);

    const optionsHTML = await response.text();
    quafSelect.innerHTML = optionsHTML;

    grupoQUAF.style.display = 'block';
    quafSelect.disabled = false;

    const optN = quafSelect.querySelector('option[value="N"]');
    if (optN) {
      quafSelect.value = 'N';
    } else if (quafSelect.options.length > 0) {
      quafSelect.selectedIndex = 0;
    }

    quafSelect.dispatchEvent(new Event('change'));
    carregarQUAS();
  }

  function carregarQUAFP() {
    const quafSelect = document.getElementById('QUAF');
    const grupoQUAFP = document.getElementById('GrupoQUAFP');
    const quafpSelect = document.getElementById('QUAFP');
    const subgrupoQUAF = document.querySelector('#GrupoQUAF .subgrupo');

    const valor = quafSelect.value;

    if (valor && valor !== 'N') {
      grupoQUAFP.style.display = 'block';
      quafpSelect.value = 'A';
      if (subgrupoQUAF) subgrupoQUAF.style.display = 'block';
    } else {
      grupoQUAFP.style.display = 'none';
      quafpSelect.value = '';
      if (subgrupoQUAF) subgrupoQUAF.style.display = 'none';
    }

    carregarQUBT();
  }

  function carregarQUBT() {
    const quafSelect = document.getElementById('QUAF');
    const grupoQUBT = document.getElementById('GrupoQUBT');
    const qubtSelect = document.getElementById('QUBT');
    const qubr = document.getElementById('QUBR')?.value;

    const opt2 = document.getElementById('optQUBT2');
    const opt4 = document.getElementById('optQUBT4');

    if (quafSelect.value === 'BT') {
      grupoQUBT.style.display = 'block';
      qubtSelect.value = '1';

      const ocultar = qubr === '025' || qubr === '150';
      if (opt2) opt2.style.display = ocultar ? 'none' : 'inline';
      if (opt4) opt4.style.display = ocultar ? 'none' : 'inline';
    } else {
      grupoQUBT.style.display = 'none';

  function validarQUOPC() {
    const checkboxes = document.querySelectorAll('#checklistQUOPC input[type="checkbox"]');
    let selecionados = Array.from(checkboxes)
      .filter(cb => cb.checked)
      .map(cb => cb.value);

    if (selecionados.includes("NÃO") && selecionados.length > 1) {
      document.querySelector('input[name="QUOPC"][value="NÃO"]').checked = false;
      selecionados = selecionados.filter(v => v !== "NÃO");
    }

    if (selecionados.length === 0) {
      document.querySelector('input[name="QUOPC"][value="NÃO"]').checked = true;
      selecionados = ["NÃO"];
    }

    if (selecionados.includes("ACOR") && selecionados.includes("PINTCZ")) {
      document.querySelector('input[name="QUOPC"][value="ACOR"]').checked = false;
      selecionados = selecionados.filter(v => v !== "ACOR");
    }

    if (selecionados.includes("RESP") && selecionados.includes("RESLAT")) {
      document.querySelector('input[name="QUOPC"][value="RESP"]').checked = false;
      selecionados = selecionados.filter(v => v !== "RESP");
    }

    document.getElementById('QUOPC').value = selecionados.join(',');

    const nomesVisiveis = selecionados.map(valor => {
      const label = Array.from(document.querySelectorAll('#checklistQUOPC label')).find(lbl =>
        lbl.querySelector(`input[value="${valor}"]`)
      );
      return label ? label.textContent.trim() : valor;
    });

    document.querySelector('#dropdownQUOPC .dropdown-button').textContent = nomesVisiveis.join(', ');

    document.getElementById('QUOPC').dispatchEvent(new Event('change'));

    const grupoMOPP = document.getElementById('GrupoMOPP');

    if (moln === "3.APM" || moln === "3.SPM") {
      grupoMOPP.style.display = 'none';
      return;
    }

    moppSelect.innerHTML = '';

    const opcoes = [
      { valor: "PC1", label: "1" },
      { valor: "PC2", label: "2" },
      { valor: "PC3", label: "3" },
      { valor: "PC4", label: "4" }
    ];

    opcoes.forEach(op => {
      const option = document.createElement('option');
      option.value = op.valor;
      option.textContent = op.label;
      moppSelect.appendChild(option);
    });

    let valorPadrao = "PC1";
    if (moln === "3.I" || (moln === "2.I" && motp === "T")) valorPadrao = "PC1";

<script nonce="<?= htmlspecialchars(csp_nonce(), ENT_QUOTES, 'UTF-8'); ?>">
  const endpointPreco = '/PaginasConfiguradoresPrecoVenda/QUPV.php';
  function mostrarDetalhesPreco(paramString) {
    const params = new URLSearchParams(
      typeof paramString === 'string'
        ? paramString
        : new URLSearchParams(paramString).toString()
    );
    if (window.codigoProduto) {
      params.append('produto', window.codigoProduto);
    }
    const codInput = document.getElementById('codigoClienteInput');
    if (codInput && codInput.value.trim()) {
      params.set('pessoa', codInput.value.trim());
    }
    fetch(endpointPreco, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString()
    })
      .then(r => r.json())
      .then(p => {
        const valorRS = p && p['001'] ? parseFloat(String(p['001']).replace(/\./g, '').replace(',', '.')) : NaN;
        const valorSP = p && p['003'] ? parseFloat(String(p['003']).replace(/\./g, '').replace(',', '.')) : NaN;
        const textoRS = !isNaN(valorRS) && valorRS !== 0 ? `R$ ${valorRS.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}` : '👉 😊 Ops! O preço de venda está indisponível no momento. 📞 Fale com nossos Consultores Comerciais para mais informações!';
        const textoSP = !isNaN(valorSP) && valorSP !== 0 ? `R$ ${valorSP.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}` : '👉 😊 Ops! O preço de venda está indisponível no momento. 📞 Fale com nossos Consultores Comerciais para mais informações!';
        const precoRSElem = document.getElementById('precoRS');
        if (precoRSElem) precoRSElem.innerHTML = `<strong>Preço Final de Venda:</strong> ${textoRS}`;
        const precoSPElem = document.getElementById('precoSP');
        if (precoSPElem) precoSPElem.innerHTML = `<strong>Preço Final de Venda:</strong> ${textoSP}`;
        const linhaPrecoElem = document.getElementById('linhaEntreEmpresasPreco');
        if (linhaPrecoElem) linhaPrecoElem.style.display = 'block';
        const notaRS = document.getElementById('notaPrecoRS');
        const notaSP = document.getElementById('notaPrecoSP');
        const mostrarNota = window.produtoExiste === false;
        if (notaRS) notaRS.style.display = mostrarNota ? 'block' : 'none';
        if (notaSP) notaSP.style.display = mostrarNota ? 'block' : 'none';
      });
  }

  document.addEventListener('DOMContentLoaded', () => {
    const codInput = document.getElementById('codigoClienteInput');
    const codBtn = document.getElementById('codigoClienteBtn');
    const limparBtn = document.getElementById('limparClienteBtn');
    const nomeInfo = document.getElementById('nomeClienteInfo');

    let nomeCtrl = null;
    const carregarNome = async codigo => {
      if (!nomeInfo) return;
      if (nomeCtrl) nomeCtrl.abort();
      if (!codigo) { nomeInfo.textContent = ''; nomeCtrl = null; return; }
      nomeCtrl = new AbortController();
      try {
        const r = await fetch('/AcessosConsultas/BuscarDadosPessoaPlenus.php?q=' + encodeURIComponent(codigo) + '&offset=0', { signal: nomeCtrl.signal });
        if (!r.ok) throw new Error('HTTP');
        const j = await r.json();
        const pessoa = (j.pessoas || []).find(p => p.CD_PESSOA === codigo);
        nomeInfo.textContent = pessoa ? pessoa.NM_PESSOA : '';
      } catch (e) {
        if (e.name !== 'AbortError') nomeInfo.textContent = '';
      } finally {
        nomeCtrl = null;
      }
    };

    const atualizarPreco = () => {
      const params = gerarLinkAtual().split('?')[1] || '';
      carregarNome(codInput?.value.trim());
      mostrarDetalhesPreco(params);
    };

    if (codInput) {
      codInput.value = '001';
      codInput.addEventListener('change', atualizarPreco);
      codInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); atualizarPreco(); }
      });
    }
    if (codBtn) {
      codBtn.addEventListener('click', atualizarPreco);
    }
    if (limparBtn) {
      limparBtn.addEventListener('click', () => {
        if (codInput) codInput.value = '001';
        atualizarPreco();
      });
    }
  });
</script>
